name: bacterial_analyzer
description: Professional Bacterial Culture Analysis Tool
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  file_picker: ^6.1.1
  path_provider: ^2.1.1
  url_launcher: ^6.1.1
  syncfusion_flutter_charts: ^23.1.42
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
  fonts:
    - family: SpaceMono
      fonts:
        - asset: fonts/SpaceMono-Regular.ttf
        - asset: fonts/SpaceMono-Bold.ttf
    - family: Syne
      fonts:
        - asset: fonts/Syne-Regular.ttf
        - asset: fonts/Syne-Medium.ttf
        - asset: fonts/Syne-Bold.ttf