<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bacterial Culture Analyzer Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06090f;--surface:#0c1520;--surface2:#0a1826;
  --border:#1a2d42;--border2:#243d56;
  --text:#ddeeff;--text2:#7a9ab5;--muted:#3a6080;
  --c1:#00f5c4;--c2:#ff6b6b;--c3:#ffd93d;--c4:#c084fc;--c5:#60a5fa;
  --shadow:0 8px 32px #00000055;
}
body.light{
  --bg:#f0f4f8;--surface:#fff;--surface2:#e8eef5;
  --border:#d0dce8;--border2:#b8ccdc;
  --text:#0d1e2e;--text2:#4a6a86;--muted:#6a8aa6;
  --shadow:0 8px 32px #00000018;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;transition:background .3s,color .3s}
.app{max-width:1300px;margin:0 auto;padding:24px 16px 60px;display:flex;flex-direction:column;gap:18px}

/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header-left h1{font-size:clamp(1.3rem,3vw,2rem);font-weight:800;letter-spacing:-1px;background:linear-gradient(120deg,#00f5c4 0%,#6bcbff 50%,#ff6b6b 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.header-left p{color:var(--muted);font-family:'Space Mono',monospace;font-size:0.7rem;margin-top:3px}
.header-right{display:flex;gap:6px;flex-wrap:wrap}

/* ── Buttons ── */
.btn{padding:6px 12px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:'Syne',sans-serif;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:hover{border-color:var(--c1);color:var(--c1);background:color-mix(in srgb,var(--c1) 8%,transparent)}
.btn.active{border-color:var(--c1);color:var(--c1);background:color-mix(in srgb,var(--c1) 10%,transparent)}
.btn.danger:hover{border-color:#ff6b6b;color:#ff6b6b;background:#ff6b6b0d}
.btn-primary{padding:8px 16px;border-radius:7px;border:none;background:linear-gradient(135deg,#00c49a,#007bbf);color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer;transition:opacity .15s;white-space:nowrap;}
.btn-primary:hover{opacity:.85}

/* ── Tabs ── */
.tab-bar{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:5px;flex-wrap:wrap;}
.tab{padding:6px 16px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all .15s;}
.tab.active{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}

/* ── Toolbar ── */
.toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;}
.toolbar-sep{width:1px;height:22px;background:var(--border);margin:0 3px}

/* ── Storage bar ── */
.storage-bar{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:7px 14px;flex-wrap:wrap;gap:8px;}
.storage-info{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.storage-dot{width:7px;height:7px;border-radius:50%;background:#00f5c4;box-shadow:0 0 5px #00f5c4;animation:sPulse 2s infinite;flex-shrink:0;}
.storage-dot.off{background:#ffd93d;box-shadow:0 0 5px #ffd93d;}
@keyframes sPulse{0%,100%{opacity:1}50%{opacity:.4}}
.storage-label{font-family:'Space Mono',monospace;font-size:0.68rem;color:var(--text2);}
.storage-meta{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted);}
.storage-actions{display:flex;gap:5px;}

/* ── Stats row ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:13px 15px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s,transform .15s;}
.stat-card:hover{transform:translateY(-2px)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
.stat-card.active{border-color:var(--accent)}
.stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.stat-header{display:flex;align-items:center;gap:6px}
.stat-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.stat-name{font-size:0.78rem;font-weight:700;color:var(--text);background:transparent;border:none;outline:none;font-family:'Syne',sans-serif;width:120px;cursor:text;}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:0.82rem;padding:2px 5px;border-radius:4px;transition:color .15s;}
.icon-btn:hover{color:#ff6b6b}
.stat-vals{display:flex;gap:10px;flex-wrap:wrap}
.stat-item{display:flex;flex-direction:column;gap:1px}
.stat-label{font-family:'Space Mono',monospace;font-size:0.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.stat-value{font-family:'Space Mono',monospace;font-size:0.85rem;font-weight:700;color:var(--accent)}
.add-var-card{background:transparent;border:1px dashed var(--border);border-radius:11px;padding:13px 15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:0.8rem;font-weight:600;transition:all .15s;min-height:85px;}
.add-var-card:hover{border-color:var(--c1);color:var(--c1);background:color-mix(in srgb,var(--c1) 5%,transparent)}

/* ── Chart ── */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:18px;display:flex;flex-direction:column;gap:12px;}
.chart-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.chart-title{font-size:0.9rem;font-weight:800}
.chart-wrap{position:relative;height:380px}
.phase-legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.phase-item{display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted)}
.phase-swatch{width:18px;height:3px;border-radius:2px}
.zoom-hint{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--border2)}

/* ── Panels ── */
.panels-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:800px){.panels-row{grid-template-columns:1fr}}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px;display:flex;flex-direction:column;gap:12px}
.panel-title{font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--c1);text-transform:uppercase;letter-spacing:2px}

/* ── Form ── */
.add-form{display:flex;flex-direction:column;gap:8px}
.add-fields{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.field input,.field select,.field textarea{padding:6px 9px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;font-size:0.82rem;outline:none;transition:border-color .15s;}
.field input{width:95px}.field select{cursor:pointer}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--c1)}
.error-msg{font-family:'Space Mono',monospace;font-size:0.7rem;color:#ff6b6b}
.success-msg{font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--c1)}

/* ── Table ── */
.table-wrap{max-height:200px;overflow-y:auto;border-radius:7px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-family:'Space Mono',monospace;font-size:0.72rem}
thead th{position:sticky;top:0;background:var(--surface2);color:var(--muted);font-weight:400;padding:5px 9px;text-align:left;border-bottom:1px solid var(--border);font-size:0.6rem;text-transform:uppercase;letter-spacing:1px;}
tbody td{padding:5px 9px;color:var(--text2);border-bottom:1px solid var(--border)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface2)}
.td-edit{cursor:pointer;color:var(--muted)}.td-edit:hover{color:var(--c1)}
.td-del{cursor:pointer;color:var(--muted)}.td-del:hover{color:#ff6b6b}
.empty-table{text-align:center;padding:18px;color:var(--border2);font-size:0.72rem;font-family:'Space Mono',monospace}

/* ── DT Result ── */
.dt-result{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:12px;display:flex;flex-direction:column;gap:8px;}
.dt-row{display:flex;justify-content:space-between;align-items:center}
.dt-label{font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.dt-value{font-family:'Space Mono',monospace;font-size:0.95rem;font-weight:700;color:var(--c1)}
.dt-note{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted);line-height:1.5}

/* ── Alert system ── */
.alert-strip{display:flex;flex-direction:column;gap:7px;transition:all .3s}
.alert-strip:empty{display:none}
.alert-card{display:flex;align-items:flex-start;gap:10px;border-radius:10px;padding:11px 14px;border-left:4px solid var(--al-color);background:color-mix(in srgb,var(--al-color) 8%,var(--surface));border-top:1px solid color-mix(in srgb,var(--al-color) 20%,var(--border));border-right:1px solid color-mix(in srgb,var(--al-color) 20%,var(--border));border-bottom:1px solid color-mix(in srgb,var(--al-color) 20%,var(--border));animation:alertIn .3s ease;position:relative;}
@keyframes alertIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.alert-icon{font-size:1rem;flex-shrink:0;margin-top:1px}
.alert-body{flex:1;display:flex;flex-direction:column;gap:2px}
.alert-title{font-family:'Syne',sans-serif;font-size:0.8rem;font-weight:700;color:var(--al-color)}
.alert-desc{font-family:'Space Mono',monospace;font-size:0.67rem;color:var(--text2);line-height:1.5}
.alert-meta{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted)}
.alert-ai{font-family:'Space Mono',monospace;font-size:0.67rem;color:var(--c4);line-height:1.5;margin-top:4px;padding:6px 8px;background:color-mix(in srgb,var(--c4) 8%,transparent);border-radius:6px;border-left:2px solid var(--c4);}
.alert-dismiss{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;padding:0 4px;line-height:1;flex-shrink:0;transition:color .15s;}
.alert-dismiss:hover{color:var(--al-color)}
.alert-critical{--al-color:#ff4444}.alert-warning{--al-color:#ffd93d}.alert-info{--al-color:#60a5fa}.alert-success{--al-color:#00f5c4}
.alert-header-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.alert-badge{display:inline-flex;align-items:center;justify-content:center;background:#ff4444;color:#fff;border-radius:50%;width:17px;height:17px;font-size:0.62rem;font-weight:700;font-family:'Space Mono',monospace;margin-left:5px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.threshold-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.thresh-item{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 11px;display:flex;flex-direction:column;gap:3px}
.thresh-label{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.thresh-input{padding:4px 7px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;font-size:0.8rem;outline:none;transition:border-color .15s;width:100%;}
.thresh-input:focus{border-color:var(--c1)}
.alert-log-wrap{max-height:180px;overflow-y:auto}
.alert-log-entry{display:flex;gap:8px;align-items:flex-start;padding:6px 9px;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;font-size:0.67rem;}
.alert-log-entry:last-child{border-bottom:none}
.log-time{color:var(--muted);flex-shrink:0;font-size:0.6rem;padding-top:1px}
.log-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.log-text{color:var(--text2);line-height:1.4}
.no-alerts{text-align:center;padding:16px;color:var(--border2);font-family:'Space Mono',monospace;font-size:0.72rem}

/* ── Heatmap ── */
.heatmap-wrap{overflow-x:auto}
.heatmap-grid{display:grid;gap:3px;min-width:600px}
.hm-cell{border-radius:4px;height:32px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:0.58rem;color:rgba(255,255,255,0.7);transition:transform .1s;}
.hm-cell:hover{transform:scale(1.08);z-index:1}
.hm-label{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted);white-space:nowrap;padding:4px 6px;display:flex;align-items:center;}

/* ── Radar chart ── */
.radar-wrap{position:relative;height:300px}

/* ── CFU converter ── */
.cfu-result{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:12px;font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--text2);line-height:1.8}
.cfu-big{font-size:1.1rem;font-weight:700;color:var(--c1)}

/* ── Notes ── */
.notes-area{width:100%;min-height:100px;resize:vertical;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;font-size:0.75rem;line-height:1.6;outline:none;}
.notes-area:focus{border-color:var(--c1)}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.meta-field input{width:100%}

/* ── QR / Share ── */
.share-box{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:10px}
#qrCanvas{border-radius:8px;background:#fff;padding:8px}
.share-url{font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--muted);word-break:break-all;text-align:center;max-width:100%}

/* ── AI panel ── */
.ai-output{background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:14px;font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--text2);line-height:1.8;min-height:80px;white-space:pre-wrap}
.ai-thinking{color:var(--muted);font-style:italic}
.ai-section{border-left:3px solid var(--c4);padding-left:10px;margin:8px 0}

/* ── Snapshot ── */
.snap-item{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;font-size:0.67rem;}
.snap-item:last-child{border-bottom:none}
.snap-name{color:var(--text2)}.snap-time{color:var(--muted);font-size:0.6rem}
.snap-actions{display:flex;gap:4px}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:#000000aa;z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:22px;width:min(460px,94vw);display:flex;flex-direction:column;gap:14px;box-shadow:var(--shadow);animation:slideUp .2s ease;}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:0.95rem;font-weight:800}
.modal-actions{display:flex;gap:7px;justify-content:flex-end}

/* ── Toast ── */
.toast{position:fixed;bottom:22px;right:22px;background:var(--surface);border:1px solid var(--c1);color:var(--text);border-radius:9px;padding:11px 16px;font-family:'Space Mono',monospace;font-size:0.75rem;box-shadow:var(--shadow);z-index:200;animation:fadeIn .3s ease;pointer-events:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* ── Export grid ── */
.export-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.export-card{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:12px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:5px;}
.export-card:hover{border-color:var(--c1);background:color-mix(in srgb,var(--c1) 5%,var(--surface2))}
.export-card-icon{font-size:1.2rem}
.export-card-title{font-weight:700;font-size:0.78rem}
.export-card-desc{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted);line-height:1.4}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>
<div class="app">

<!-- Header -->
<header>
  <div class="header-left">
    <h1>Bacterial Culture Analyzer Pro</h1>
    <p id="metaSubtitle">Multi-variation OD₆₀₀ · Growth kinetics · AI-powered analysis</p>
  </div>
  <div class="header-right">
    <button class="btn" onclick="toggleTheme()" id="themeBtn">☀ Light</button>
    <button class="btn" onclick="exportPNG()">⬇ PNG</button>
    <button class="btn" onclick="exportCSV()">⬇ CSV</button>
    <button class="btn" onclick="copyToClipboard()">📋 Copy</button>
    <button class="btn" onclick="printReport()">🖨 Print</button>
    <button class="btn" onclick="saveSession()">💾 Save</button>
    <button class="btn" onclick="document.getElementById('importSessionInput').click()">📂 Load</button>
    <input type="file" id="importSessionInput" accept=".json" style="display:none" onchange="loadSession(event)"/>
    <button class="btn" onclick="shareViaURL()">🔗 Share</button>
  </div>
</header>

<!-- Toolbar -->
<div class="toolbar">
  <button class="btn active" id="btnPhases" onclick="togglePhases()">📊 Phases</button>
  <button class="btn" id="btnLog" onclick="toggleLog()">📈 Log Scale</button>
  <button class="btn" id="btnErrorBars" onclick="toggleErrorBars()">± Errors</button>
  <button class="btn active" id="btnFit" onclick="toggleFit()">〜 Curve Fit</button>
  <button class="btn active" id="btnPredict" onclick="togglePredict()">🔮 Predict</button>
  <div class="toolbar-sep"></div>
  <button class="btn" onclick="resetZoom()">🔍 Zoom Reset</button>
  <button class="btn active" id="btnAnimate" onclick="toggleAnimate()">✨ Animate</button>
  <div class="toolbar-sep"></div>
  <button class="btn" onclick="document.getElementById('csvFileInput').click()">📥 Import CSV</button>
  <input type="file" id="csvFileInput" accept=".csv" style="display:none" onchange="importCSV(event)"/>
</div>

<!-- Storage Bar -->
<div class="storage-bar">
  <div class="storage-info">
    <div class="storage-dot" id="storageDot"></div>
    <span class="storage-label" id="storageLabel">Auto-save: Active</span>
    <span class="storage-meta" id="storageMeta">Saves to browser on every change</span>
  </div>
  <div class="storage-actions">
    <button class="btn" onclick="saveSnapshot()">📸 Snapshot</button>
    <button class="btn" onclick="toggleSnap()">🕓 History</button>
    <button class="btn danger" onclick="clearStorage()">🗑 Clear</button>
  </div>
</div>

<!-- Snapshot panel -->
<div id="snapPanel" style="display:none">
  <div class="panel">
    <div class="panel-title">📸 Snapshot History</div>
    <div class="table-wrap" style="max-height:140px"><div id="snapList"><p class="empty-table">No snapshots yet.</p></div></div>
  </div>
</div>

<!-- Alert Strip -->
<div class="alert-strip" id="alertStrip"></div>

<!-- Stat Cards -->
<div class="stats-row" id="statsRow"></div>

<!-- Main Tab Bar -->
<div class="tab-bar">
  <button class="tab active" onclick="switchTab('chart',this)">📈 Growth Curve</button>
  <button class="tab" onclick="switchTab('heatmap',this)">🌡 Heatmap</button>
  <button class="tab" onclick="switchTab('radar',this)">🕸 Radar</button>
  <button class="tab" onclick="switchTab('science',this)">🔬 Scientific Tools</
