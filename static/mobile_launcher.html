<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00f5c4">
    <meta name="description" content="Professional Bacterial Culture Analysis Tool">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BactAnalyzer">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Bacterial Culture Analyzer Pro</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #06090f;
            color: #ddeeff;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #00f5c4;
            margin-bottom: 20px;
        }
        .status {
            padding: 20px;
            background: #0c1520;
            border-radius: 10px;
            margin: 20px 0;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #00f5c4;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        iframe {
            width: 100%;
            height: 600px;
            border: 1px solid #1a2d42;
            border-radius: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧬 Bacterial Culture Analyzer Pro</h1>

        <div class="status" id="status">
            <div class="loading"></div>
            <p>Loading application...</p>
            <p id="statusText">Connecting to analysis server...</p>
        </div>

        <iframe id="appFrame" src="" allowfullscreen></iframe>

        <div style="margin-top: 20px; font-size: 14px; color: #7a9ab5;">
            <p>Professional bacterial growth analysis tool with AI insights</p>
            <p>Features: Growth curves, heatmaps, radar analysis, data import/export</p>
        </div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const statusText = document.getElementById('statusText');
        const appFrame = document.getElementById('appFrame');

        // Try to load the app
        async function loadApp() {
            try {
                statusText.textContent = 'Checking server connection...';

                // Check if server is running
                const response = await fetch('http://localhost:5000/api/data', {
                    timeout: 5000
                });

                if (response.ok) {
                    statusText.textContent = 'Server connected! Loading interface...';
                    setTimeout(() => {
                        statusDiv.style.display = 'none';
                        appFrame.src = 'http://localhost:5000';
                        appFrame.style.display = 'block';
                    }, 1000);
                } else {
                    throw new Error('Server not responding');
                }
            } catch (error) {
                statusText.textContent = 'Server not running. Please start the server first.';
                statusDiv.innerHTML = `
                    <h3>Setup Required</h3>
                    <p>The analysis server is not running.</p>
                    <p>Please:</p>
                    <ol style="text-align: left; display: inline-block;">
                        <li>Install Python dependencies: <code>pip install -r requirements.txt</code></li>
                        <li>Start the server: <code>python mobile_app.py</code></li>
                        <li>Refresh this page</li>
                    </ol>
                    <p style="margin-top: 15px; color: #ff6b6b;">
                        Note: For APK, the server will run locally on the device.
                    </p>
                `;
            }
        }

        // Load app when page loads
        window.addEventListener('load', loadApp);

        // PWA install prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });
    </script>
</body>
</html>
